<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENAB IoT | Backend Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: rgba(255,255,255,0.1);
            --blue: #58a6ff;
            --green: #238636;
            --red: #da3633;
            --text: #c9d1d9;
            --muted: #8b949e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 40px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        h1 i { color: var(--blue); }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .stat-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; margin-top: 5px; color: var(--blue); }

        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            background: rgba(255,255,255,0.05);
            text-align: left;
            padding: 12px 15px;
            color: var(--muted);
            font-weight: 500;
        }

        td {
            padding: 12px 15px;
            border-top: 1px solid var(--border);
        }

        tr:hover { background: rgba(255,255,255,0.02); }

        .badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-purifying { background: rgba(88, 166, 255, 0.2); color: var(--blue); }
        .badge-emergency { background: rgba(218, 54, 51, 0.2); color: var(--red); }
        .badge-idle { background: rgba(139, 148, 158, 0.2); color: var(--muted); }

        .refresh-btn {
            background: var(--green);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        .refresh-btn:hover { opacity: 0.8; }
        
        .download-btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .download-btn:hover { opacity: 0.8; }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .timestamp { font-family: monospace; color: var(--muted); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid fa-database"></i> ZENAB Backend Dashboard</h1>
        <div class="btn-group">
            <a href="/api/download" class="download-btn">
                <i class="fa-solid fa-download"></i> Download Data
            </a>
            <button class="refresh-btn" onclick="fetchData()">
                <i class="fa-solid fa-rotate"></i> Refresh Data
            </button>
        </div>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Total Records</div>
            <div class="stat-value" id="total-records">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Avg AQI</div>
            <div class="stat-value" id="avg-aqi">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Server Status</div>
            <div class="stat-value" style="color: var(--green)">ONLINE</div>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Device</th>
                    <th>AQI</th>
                    <th>PM2.5</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="data-table">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    async function fetchData() {
        try {
            const response = await fetch('http://127.0.0.1:5000/api/history');
            const data = await response.json();
            updateDashboard(data);
        } catch (error) {
            console.error('Error fetching data:', error);
            alert('Could not connect to backend. Please ensure the server is running.');
        }
    }

    function updateDashboard(data) {
        const tableBody = document.getElementById('data-table');
        const totalRecords = document.getElementById('total-records');
        const avgAqi = document.getElementById('avg-aqi');

        tableBody.innerHTML = '';
        totalRecords.textContent = data.length;

        if (data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--muted);">No data received yet. Run the simulation to see records.</td></tr>';
            avgAqi.textContent = '0';
            return;
        }

        let totalAqi = 0;
        
        // Reversed data to show newest first
        [...data].reverse().forEach(entry => {
            totalAqi += entry.aqi || 0;
            const row = document.createElement('tr');
            
            const time = new Date(entry.timestamp).toLocaleTimeString();
            const date = new Date(entry.timestamp).toLocaleDateString();
            
            const statusClass = `badge-${entry.status || 'purifying'}`;
            
            row.innerHTML = `
                <td class="timestamp">${date} ${time}</td>
                <td>${entry.device_id || 'ZENAB-01'}</td>
                <td style="font-weight: bold; color: ${entry.aqi > 100 ? 'var(--red)' : 'var(--blue)'}">${entry.aqi}</td>
                <td>${entry.pm25.toFixed(1)}</td>
                <td><span class="badge ${statusClass}">${(entry.status || 'purifying').toUpperCase()}</span></td>
            `;
            tableBody.appendChild(row);
        });

        avgAqi.textContent = Math.round(totalAqi / data.length);
    }

    // Initial fetch
    fetchData();
    // Auto refresh every 10 seconds
    setInterval(fetchData, 10000);
</script>

</body>
</html>
